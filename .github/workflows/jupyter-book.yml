name: Build and Deploy Jupyter Book

on:
  push:
    branches: [ main ]
    paths:
      - "**/*.ipynb"
      - "**/*.md"
      - "tests/**"
      - ".github/workflows/jupyter-book.yml"
      - ".python-version"
      - "_config.yml"
      - "myst.yml"
      - "pyproject.toml"
      - "requirements-book.txt"
      - "uv.lock"
      - ".gitignore"
      - "colab.html"
      - "Makefile"
      - "scripts/**"
  pull_request:
    branches: [ main ]
    paths:
      - "**/*.ipynb"
      - "**/*.md"
      - "tests/**"
      - ".github/workflows/jupyter-book.yml"
      - ".python-version"
      - "_config.yml"
      - "myst.yml"
      - "pyproject.toml"
      - "requirements-book.txt"
      - "uv.lock"
      - ".gitignore"
      - "colab.html"
      - "Makefile"
      - "scripts/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync docs environment
        run: |
          uv sync --locked --group docs

      - name: Run Python unit tests
        run: |
          uv run --group docs python -m unittest discover -s tests

      - name: Build Jupyter Book
        run: |
          uv run --group docs jupyter book build --html --ci
        env:
          BASE_URL: /QuIP/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_build/html"

  julia-notebook-smokes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1.11.9"

      - name: Run Julia notebook smokes
        run: |
          make verify-julia-colab-smokes COLAB_JULIA_SMOKE_NOTEBOOKS=5-Benchmarking
          make verify-julia-notebook5-cache-smoke

  deploy:
    needs: [build, julia-notebook-smokes]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
